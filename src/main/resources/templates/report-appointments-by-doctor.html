<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Appointments by Doctor</title>
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>
<h1>Appointments by Doctor</h1>
<form method="get">
    Doctor:
    <select name="doctorId">
        <option value="">-- Select --</option>
        <option th:each="d : ${doctors}" th:value="${d.id}"
                th:text="${d.firstName + ' ' + d.lastName + ' (' + d.specialization + ')'}"></option>
    </select>
    <button type="submit">Show</button>
</form>
<div th:if="${appointments != null}">
    <h2>Results</h2>
    <table border="1" th:if="${!appointments.isEmpty()}">
        <tr><th>Appointment ID</th><th>Date</th><th>Patient</th><th>Status</th></tr>
        <tr th:each="a : ${appointments}">
            <td th:text="${a.id}"></td>
            <td th:text="${a.appointmentDate}"></td>
            <td th:text="${a.patientId}"></td>
            <td th:text="${a.status}"></td>
        </tr>
    </table>
    <p th:if="${appointments.isEmpty()}">No appointments found.</p>
</div>
</body>
</html>
