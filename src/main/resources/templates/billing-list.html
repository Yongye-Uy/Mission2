<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>All Billings</title>
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>
<h1>All Billings</h1>
<a th:href="@{/billings/new}">New Billing</a>
<table border="1" th:if="${!billings.isEmpty()}">
    <tr>
        <th>Patient</th>
        <th>Amount</th>
        <th>Date</th>
        <th>Status</th>
        <th>Appointment</th>
    </tr>
    <tr th:each="entry : ${billings}">
        <td th:text="${entry.patientName}"></td>
        <td th:text="${entry.billing.amount}"></td>
        <td th:text="${entry.billing.billingDate}"></td>
        <td th:text="${entry.billing.paymentStatus}"></td>
        <td th:text="${entry.billing.appointmentId}"></td>
    </tr>
</table>
<p th:if="${billings.isEmpty()}">No billings found. <a th:href="@{/billings/new}">Create one</a>.</p>
</body>
</html>
