<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Appointments</title>
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>
<h1>Appointments</h1>
<a th:href="@{/appointments/new}">New Appointment</a>
<table border="1">
    <tr>
        <th>ID</th>
        <th>Patient</th>
        <th>Doctor</th>
        <th>Date</th>
        <th>Status</th>
        <th>Medicines</th>
        <th>Details</th>
    </tr>
    <tr th:each="entry : ${appointments}">
        <td th:text="${entry.appointment.id}"></td>
        <td th:text="${entry.patientName}"></td>
        <td th:text="${entry.doctorName}"></td>
        <td th:text="${entry.appointment.appointmentDate}"></td>
        <td th:text="${entry.appointment.status}"></td>
        <td>
                <span th:each="med, iter : ${entry.medicines}"
                      th:text="${med} + (iter.last ? '' : ', ')"></span>
        </td>
        <td>
            <a th:href="@{/appointments/{id}(id=${entry.appointment.id})}">View</a>
        </td>
    </tr>
</table>
</body>
</html>
