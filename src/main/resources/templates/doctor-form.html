<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Doctor</title>
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>
<h1>Add Doctor</h1>
<form th:action="@{/doctors}" th:object="${doctor}" method="post">
    First Name: <input type="text" th:field="*{firstName}"/><br/>
    Last Name: <input type="text" th:field="*{lastName}"/><br/>
    Specialization: <input type="text" th:field="*{specialization}"/><br/>
    Schedule: <input type="text" th:field="*{schedule}"/><br/>
    <button type="submit">Save</button>
</form>
</body>
</html>
