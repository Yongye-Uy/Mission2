<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Doctors</title>
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>
<h1>Doctors</h1>
<a th:href="@{/doctors/new}">Add New Doctor</a>
<table border="1">
    <tr>
        <th>Name</th><th>Specialization</th><th>Schedule</th>
    </tr>
    <tr th:each="d : ${doctors}">
        <td th:text="${d.firstName + ' ' + d.lastName}"></td>
        <td th:text="${d.specialization}"></td>
        <td th:text="${d.schedule}"></td>
    </tr>
</table>
</body>
</html>
