<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Patient Detail</title>
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>
<h1>Patient Details</h1>
<table>
    <tr><td><strong>ID:</strong></td><td th:text="${patient.id}"></td></tr>
    <tr><td><strong>First Name:</strong></td><td th:text="${patient.firstName}"></td></tr>
    <tr><td><strong>Last Name:</strong></td><td th:text="${patient.lastName}"></td></tr>
    <tr><td><strong>Date of Birth:</strong></td><td th:text="${patient.dob}"></td></tr>
    <tr><td><strong>Gender:</strong></td><td th:text="${patient.gender}"></td></tr>
    <tr><td><strong>Address:</strong></td><td th:text="${patient.address}"></td></tr>
    <tr><td><strong>Phone:</strong></td><td th:text="${patient.phone}"></td></tr>
    <tr><td><strong>Insurance Info:</strong></td><td th:text="${patient.insuranceInfo}"></td></tr>
</table>
<br/>
<a th:href="@{/patients}">Back to Patient List</a>
</body>
</html>
