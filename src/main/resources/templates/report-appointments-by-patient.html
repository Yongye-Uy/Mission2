<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Appointments by Patient</title>
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>
<h1>Appointments by Patient</h1>
<form method="get">
    Patient:
    <select name="patientId">
        <option value="">-- Select --</option>
        <option th:each="p : ${patients}" th:value="${p.id}"
                th:text="${p.firstName + ' ' + p.lastName}"></option>
    </select>
    <button type="submit">Show</button>
</form>
<div th:if="${appointments != null}">
    <h2>Results</h2>
    <table border="1" th:if="${!appointments.isEmpty()}">
        <tr><th>Appointment ID</th><th>Date</th><th>Doctor</th><th>Status</th></tr>
        <tr th:each="a : ${appointments}">
            <td th:text="${a.id}"></td>
            <td th:text="${a.appointmentDate}"></td>
            <td th:text="${a.doctorId}"></td>
            <td th:text="${a.status}"></td>
        </tr>
    </table>
    <p th:if="${appointments.isEmpty()}">No appointments found.</p>
</div>
</body>
</html>
